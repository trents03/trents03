<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon Animal Match</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@100;200;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #f0f9ff;
            --card-back: #4a90e2;
            --accent: #ff6b6b;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
            padding-top: 88px;
            box-sizing: border-box;
        }

        #game-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            perspective: 1000px;
            max-width: 600px;
            padding: 20px;
        }

        .card {
            width: 80px;
            height: 80px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            visibility: hidden;
            pointer-events: none;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card-front {
            background-color: var(--card-back);
            border: 3px solid white;
        }

        .card-front::after {
            content: "?";
            color: white;
            font-size: 40px;
            font-weight: bold;
        }

        .card-back {
            background-color: white;
            transform: rotateY(180deg);
            border: 3px solid #e1e1e1;
        }

        .card-back img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            border-radius: 4px;
        }

        #win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            z-index: 100;
        }

        h1 {
            font-size: 60px;
            color: #ff6b6b;
            text-shadow: 3px 3px 0px #4ecdc4, 6px 6px 0px #ffe66d;
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 fixed-top w-100">
        <div class="container px-5">
            <a class="navbar-brand" href="game.html"><span class="fw-bolder text-primary">Game</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarGame" aria-controls="navbarGame" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarGame">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="resume.html">Resume</a></li>
                    <li class="nav-item"><a class="nav-link" href="scratch.html">Scratch</a></li>
                    <li class="nav-item"><a class="nav-link" href="game.html">Game</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="game-container"></div>
    
    <div id="win-message">
        <h1 id="win-text">Yay so fun. Do it again.</h1>
        <button onclick="resetGame()" style="padding: 10px 20px; font-size: 20px; cursor: pointer; border-radius: 10px; border: none; background: #4ecdc4; color: white;">Restart!</button>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <script>
        const container = document.getElementById('game-container');
        const winMessage = document.getElementById('win-message');
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');

        let cards = [];
        let flippedCards = [];
        let matchedCount = 0;
        let lockBoard = false;

        // Animal List (Placeholder paths - in a real app, these would be your generated URLs)
        const animals = ['lion', 'panda', 'elephant', 'monkey', 'giraffe', 'zebra', 'hippo', 'tiger', 'rabbit', 'koala', 'fox', 'owl', 'penguin', 'cat', 'dog', 'frog', 'bear', 'turtle'];
        const cardValues = [...animals, ...animals];

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            const shuffled = shuffle(cardValues);
            container.innerHTML = '';
            shuffled.forEach((animal, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.animal = animal;
                
                // Using dynamic placeholders that mimic cartoon styles
                const imgUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${animal}&backgroundColor=ffdfbf`;
                
                card.innerHTML = `
                    <div class="card-face card-front"></div>
                    <div class="card-face card-back">
                        <img src="${imgUrl}" alt="${animal}">
                    </div>
                `;
                
                card.addEventListener('click', flipCard);
                container.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === flippedCards[0]) return;

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            lockBoard = true;
            let isMatch = flippedCards[0].dataset.animal === flippedCards[1].dataset.animal;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            setTimeout(() => {
                flippedCards.forEach(card => card.classList.add('matched'));
                startConfetti();
                matchedCount += 2;
                resetBoard();
                if (matchedCount === 36) endGame();
            }, 600);
        }

        function unflipCards() {
            setTimeout(() => {
                flippedCards.forEach(card => card.classList.remove('flipped'));
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            flippedCards = [];
            lockBoard = false;
        }

        function endGame() {
            winMessage.style.display = 'block';
        }

        function resetGame() {
            matchedCount = 0;
            winMessage.style.display = 'none';
            createBoard();
        }

        // Confetti Logic
        let particles = [];
        function startConfetti() {
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: -10,
                    size: Math.random() * 7 + 3,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    velocity: { x: (Math.random() - 0.5) * 3, y: Math.random() * 3 + 2 }
                });
            }
        }

        function updateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.velocity.x;
                p.y += p.velocity.y;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                if (p.y > canvas.height) particles.splice(i, 1);
            });
            requestAnimationFrame(updateConfetti);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        createBoard();
        updateConfetti();

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
